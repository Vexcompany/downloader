<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagaska Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="main-header">
      <h1>🎯 Pagaska Downloader</h1>
      <p>Download media dari YouTube, TikTok, Instagram</p>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-wrapper">
        <input 
          type="url" 
          id="urlInput" 
          placeholder="Paste link YouTube, TikTok, atau Instagram..." 
          autocomplete="off"
        />
        <button id="clearBtn" class="clear-btn" onclick="clearInput()" title="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <button id="downloadBtn" class="download-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Download
      </button>

      <!-- Quick Format Buttons (YouTube only) -->
      <div class="quick-formats" id="quickFormats" style="display: none;">
        <span> atau pilih format:</span>
        <button onclick="handleDownload('mp3')" class="format-btn mp3">🎵 MP3</button>
        <button onclick="handleDownload('mp4')" class="format-btn mp4">🎬 MP4</button>
      </div>
    </section>

    <!-- Loading Section -->
    <section id="loadingSection" class="loading-section" style="display: none;">
      <div class="spinner"></div>
      <p id="loadingApi">Menghubungi server...</p>
      <p class="loading-hint">Mohon tunggu sebentar</p>
    </section>

    <!-- Error Section -->
    <section id="errorSection" class="error-section" style="display: none;">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h3>Oops! Terjadi Kesalahan</h3>
      <p id="errorMsg">Tidak dapat mengambil media</p>
      <button onclick="clearResult()" class="retry-btn">Coba Lagi</button>
    </section>

    <!-- Result Section -->
    <section id="resultSection" class="result-section" style="display: none;">
      <div class="result-header">
        <span id="mediaSource" class="platform-badge">YouTube</span>
        <button onclick="clearResult()" class="close-result">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <h2 id="mediaTitle" class="media-title">Judul Video</h2>
      
      <div id="mediaPreview" class="media-preview"></div>
      
      <div class="download-options">
        <h3>Pilih Format Download:</h3>
        <div id="optionsGrid" class="options-grid"></div>
      </div>
    </section>

    <!-- History Section -->
    <section id="historySection" class="history-section">
      <div class="history-header">
        <h3>📋 Riwayat Download</h3>
        <button onclick="clearHistory()" class="clear-history-btn">Hapus Semua</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="history-empty">
          <p>Belum ada riwayat download</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
